<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Task Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>📋 Daily Task Checklist</h1>
      <p class="subtitle">Stay organized and track your daily tasks</p>
    </header>

    <!-- Add Task Section -->
    <div class="add-task-section">
      <div class="input-group">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task..."
          class="task-input"
        >
        <button id="addBtn" class="btn btn-primary">Add Task</button>
      </div>
      <div id="errorMessage" class="error-message"></div>
    </div>

    <!-- Stats Section -->
    <div class="stats-container">
      <div class="stat-box">
        <span class="stat-number" id="totalTasks">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-box">
        <span class="stat-number" id="completedTasks">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-box">
        <span class="stat-number" id="pendingTasks">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-buttons">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="pending">Pending</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <!-- Tasks List -->
    <div class="tasks-container">
      <div id="tasksList" class="tasks-list">
        <div class="empty-state">
          <p>📝 No tasks yet. Add one to get started!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="spinner hidden">
    <div class="spinner-circle"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
