<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Task Checklist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- 3D Interactive Star Background -->
  <canvas id="starCanvas"></canvas>
  
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>📋 Daily Task Checklist</h1>
      <p class="subtitle">Stay organized and track your daily tasks</p>
    </header>

    <!-- Add Task Section -->
    <div class="add-task-section">
      <div class="task-form">
        <div class="form-row">
          <input
            type="text"
            id="taskInput"
            placeholder="Task title..."
            class="task-input"
            maxlength="200"
          >
        </div>
        
        <div class="form-row">
          <textarea
            id="taskDescription"
            placeholder="Description (optional)..."
            class="task-textarea"
            rows="2"
            maxlength="1000"
          ></textarea>
        </div>

        <div class="form-row form-grid">
          <select id="taskPriority" class="task-select">
            <option value="low">🟢 Low Priority</option>
            <option value="medium" selected>🟡 Medium Priority</option>
            <option value="high">🔴 High Priority</option>
          </select>

          <input
            type="date"
            id="taskDueDate"
            class="task-input"
          >

          <input
            type="text"
            id="taskCategory"
            placeholder="Category..."
            class="task-input"
            maxlength="50"
          >
        </div>

        <div class="form-row">
          <button id="addBtn" class="btn btn-primary">Add Task</button>
          <button id="clearFormBtn" class="btn btn-secondary">Clear</button>
        </div>
      </div>
      
      <div id="errorMessage" class="error-message"></div>
      <div id="successMessage" class="success-message"></div>
    </div>

    <!-- Stats Section -->
    <div class="stats-container">
      <div class="stat-box">
        <span class="stat-number" id="totalTasks">0</span>
        <span class="stat-label">Total Tasks</span>
      </div>
      <div class="stat-box">
        <span class="stat-number" id="completedTasks">0</span>
        <span class="stat-label">Completed</span>
      </div>
      <div class="stat-box">
        <span class="stat-number" id="pendingTasks">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>

    <!-- Filter Buttons -->
    <div class="filter-section">
      <div class="quick-filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
        <button class="filter-btn" data-filter="high">🔴 High Priority</button>
      </div>

      <div class="search-bar">
        <input
          type="text"
          id="searchInput"
          placeholder="🔍 Search tasks..."
          class="search-input"
        >
        <button id="darkModeBtn" class="btn-icon" title="Toggle dark mode">🌙</button>
      </div>

      <div class="advanced-filters">
        <select id="filterPriority" class="filter-select">
          <option value="">All Priorities</option>
          <option value="high">High Priority</option>
          <option value="medium">Medium Priority</option>
          <option value="low">Low Priority</option>
        </select>

        <select id="filterCategory" class="filter-select">
          <option value="">All Categories</option>
        </select>

        <select id="sortBy" class="filter-select">
          <option value="created_at">Newest First</option>
          <option value="due_date">By Due Date</option>
          <option value="priority">By Priority</option>
          <option value="title">By Title</option>
        </select>
      </div>
    </div>

    <!-- Tasks List -->
    <div class="tasks-container">
      <div id="tasksList" class="tasks-list">
        <div class="empty-state">
          <p>📝 No tasks yet. Add one to get started!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Spinner -->
  <div id="loadingSpinner" class="spinner hidden">
    <div class="spinner-circle"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
